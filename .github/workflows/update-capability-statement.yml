name: Update DHP Capability Statement

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:      # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  update-capability-statement:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Fetch Capability Statement
        shell: bash
        run: |
          set -euo pipefail

          # Fetch to a temp file so a failed/partial download never reaches the pipeline.
          # --max-time guards against the server stalling (it once hung for 17 min and
          # produced an empty file that got committed); --retry handles transient errors.
          curl -sSf --max-time 60 --retry 3 --retry-delay 10 \
            "https://playground.dhp.uz/fhir/metadata" -o raw.json

          # Refuse to proceed unless we actually got a CapabilityStatement.
          if [ "$(jq -r '.resourceType // empty' raw.json)" != "CapabilityStatement" ]; then
            echo "Fetched content is not a CapabilityStatement; aborting" >&2
            exit 1
          fi

          jq -S '. + {id: "DHPCapabilityStatement"}
            | del(.rest[0].resource[] | select(.type == "Observation" and .supportedProfile == null))
            | walk(if type == "array" then sort else . end)' raw.json > \
            CapabilityStatement-DHPCapabilityStatement.json

          rm -f raw.json

      - name: Check for meaningful changes
        id: check_changes
        run: |
          # Create temporary files without the date field for comparison
          jq 'del(.date)' input/vocabulary/CapabilityStatement-DHPCapabilityStatement.json > /tmp/current_without_date.json
          jq 'del(.date)' CapabilityStatement-DHPCapabilityStatement.json > /tmp/new_without_date.json

          # Compare the date-less versions
          if diff -q /tmp/current_without_date.json /tmp/new_without_date.json > /dev/null; then
            echo "No meaningful changes detected (only date changed)"
            echo "changes=false" >> $GITHUB_OUTPUT
            # Clean up the fetched file since we don't need it
            rm -f CapabilityStatement-DHPCapabilityStatement.json
          else
            echo "Meaningful changes detected"
            echo "changes=true" >> $GITHUB_OUTPUT
            # Move the new file into place
            mv CapabilityStatement-DHPCapabilityStatement.json input/vocabulary/CapabilityStatement-DHPCapabilityStatement.json
          fi

          # Clean up temporary files
          rm -f /tmp/current_without_date.json /tmp/new_without_date.json

      - name: Create or Update Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="automated/update-capability-statement"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH_NAME"
          git add input/vocabulary/CapabilityStatement-DHPCapabilityStatement.json
          git commit -m "Update DHP Capability Statement"
          git push -f origin "$BRANCH_NAME"

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "Update DHP Capability Statement" \
              --body "Automated update of CapabilityStatement from playground.dhp.uz/fhir/metadata" \
              --base main \
              --head "$BRANCH_NAME"
          else
            echo "PR #$EXISTING_PR already exists and has been updated with new changes"
          fi
