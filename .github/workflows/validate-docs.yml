name: Validate and upload docs

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize] # This will trigger the workflow only when a PR is opened or updated with new commits

jobs:
  sushi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Sushi
        run: sudo npm install -g fsh-sushi

      - name: Validate with Sushi
        run: sushi .

  ig-publisher:
    runs-on: ubuntu-latest
    env:
      JAVA_TOOL_OPTIONS: "-Xmx8g"

    steps:
      - uses: actions/checkout@v6

      - name: Install Jekyll
        run: sudo gem install jekyll

      - name: Install Sushi
        run: sudo npm install -g fsh-sushi

      - name: Install IG publisher
        run: |
          chmod +x ./_updatePublisher.sh
          ./_updatePublisher.sh -y

      - name: Check that the IG builds successfully
        run: |
          chmod +x ./_genonce.sh
          ./_genonce.sh
          echo "✅ IG built successfully"

      - name: Check QA report
        run: |
          # Configuration
          MAX_ALLOWED_ERRORS=6
          MAX_ALLOWED_WARNINGS=0

          if [ ! -f "output/qa.json" ]; then
            echo "❌ QA file not found: output/qa.json"
            exit 1
          fi

          # Extract errors and warnings from qa.json
          ERRORS=$(jq -r '.errs // 0' output/qa.json)
          WARNINGS=$(jq -r '.warnings // 0' output/qa.json)

          echo "  QA Results:"
          echo "   Errors: $ERRORS"
          echo "   Warnings: $WARNINGS"

          # Check if errors exceed threshold
          if [ "$ERRORS" -gt $MAX_ALLOWED_ERRORS ]; then
            echo "❌ Too many errors: $ERRORS (maximum allowed: $MAX_ALLOWED_ERRORS known errors)"
            exit 1
          fi

          # Check if there are any warnings
          if [ "$WARNINGS" -gt $MAX_ALLOWED_WARNINGS ]; then
            echo "❌ Warnings found: $WARNINGS (maximum allowed: $MAX_ALLOWED_WARNINGS)"
            exit 1
          fi

          echo "✅ QA check passed: $ERRORS errors (≤$MAX_ALLOWED_ERRORS) and $WARNINGS warnings (≤$MAX_ALLOWED_WARNINGS)"

      # - name: Wait for deployment update
      #   if: github.ref == 'refs/heads/main'
      #   run: |
      #     chmod +x ./.github/scripts/wait-for-deployment.sh
      #     ./.github/scripts/wait-for-deployment.sh https://dhp.uz/fhir/core/en/index.html 3600

      - name: Upload output folder
        if: always() && hashFiles('output/**/*') != ''
        uses: actions/upload-artifact@v7
        with:
          name: ig-output-${{ github.run_number }}
          path: output/
          retention-days: 30
          if-no-files-found: warn

      - name: Connect to VPN
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          sudo apt-get update && sudo apt-get install -y openvpn
          echo "${{ secrets.OVPN_CONFIG }}" > config.ovpn
          sudo openvpn --config config.ovpn --daemon --log /tmp/vpn.log
          # Wait for the tunnel interface to come up
          for i in $(seq 1 30); do
            if ip link show tun0 &>/dev/null; then
              echo "✅ VPN connected (tun0 is up)"
              exit 0
            fi
            echo "Waiting for VPN... ($i/30)"
            sleep 2
          done
          echo "❌ VPN failed to connect within 60s"
          cat /tmp/vpn.log
          exit 1

      - name: Validate VPN connection
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          ip addr show tun0
          ping -c 3 "${{ secrets.DEPLOY_HOST }}" || { echo "❌ Cannot reach server over VPN"; exit 1; }
          echo "✅ Server is reachable over VPN"

      - name: Upload output to server
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key -r output/* "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}"
          echo "✅ Output uploaded to server"
